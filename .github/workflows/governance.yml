name: Governance Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install mima-governance
        run: pip install mima-governance

      - name: Run governance gate check
        run: mima gates check
        env:
          MIMA_API_KEY: ${{ secrets.MIMA_API_KEY }}
          MIMA_WORKSPACE_ID: "a92d5798-9e09-4166-a9a6-9dea300aae0e"

      - name: Run policy assertions
        run: mima policy check
        env:
          MIMA_API_KEY: ${{ secrets.MIMA_API_KEY }}
          MIMA_WORKSPACE_ID: "a92d5798-9e09-4166-a9a6-9dea300aae0e"

      - name: Run governance tests
        run: mima test tests/test_governance.py
